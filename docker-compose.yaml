services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://neondb_owner:npg_Hf5jvbVskE6U@ep-fancy-wave-a4t34ros-pooler.us-east-1.aws.neon.tech/neondb
      - CORS_ORIGINS=http://localhost:5173,http://frontend:5173
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    volumes:
      - ./backend:/app
    depends_on:
      - qdrant
    command: >
      sh -c "echo 'Starting backend...' && 
      python -c 'import sys; print(f\"Python: {sys.version}\")' && 
      cd /app && 
      uvicorn app.server:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.vite
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: >
      sh -c "echo 'Node version:' && 
      node --version && 
      echo 'Starting frontend...' && 
      npm run dev -- --host 0.0.0.0 --port 5173"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: