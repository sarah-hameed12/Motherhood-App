name: CD Pipeline

on:
  push:
    branches:
      - development

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/motherhood-backend:latest
            ghcr.io/${{ github.repository_owner }}/motherhood-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/motherhood-frontend:latest
            ghcr.io/${{ github.repository_owner }}/motherhood-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://motherhood-app.local/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tags in k8s manifests
        run: |
          if [ -f "k8s/backend/deployment.yaml" ]; then
            sed -i "s|image: .*motherhood-backend:.*|image: ghcr.io/${{ github.repository_owner }}/motherhood-backend:${{ github.sha }}|g" k8s/backend/deployment.yaml
          fi
          if [ -f "k8s/frontend/frontend.yaml" ]; then
            sed -i "s|image: .*motherhood-frontend:.*|image: ghcr.io/${{ github.repository_owner }}/motherhood-frontend:${{ github.sha }}|g" k8s/frontend/frontend.yaml
          fi

      - name: Commit and push updated manifests
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add k8s/backend/deployment.yaml k8s/frontend/frontend.yaml 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push